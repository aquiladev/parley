# Phase 6b: production overlay. Layered on top of compose.yml.
#
# Usage:
#   docker compose -f compose.yml -f compose.prod.yml up -d --build
#   (or `make deploy-prod`)
#
# What this overlay does:
#   - Removes the miniapp's `ports: 3000:3000` host binding so the service
#     is no longer directly internet-exposed. Traefik reaches it over the
#     shared external docker network.
#   - Wires Traefik labels onto miniapp for HTTPS routing + automatic
#     TLS via the configured cert resolver.
#   - Tightens the user-agent and mm-agent host bindings to 127.0.0.1
#     (already that way in compose.yml; reasserted here for clarity).
#
# Per-server tweaks (set in .env on the server, NOT committed):
#   MINIAPP_HOST            e.g. parley-miniapp.b11a.xyz
#   TRAEFIK_NETWORK         the external docker network Traefik attaches to
#                           (`docker network ls` on the host; commonly
#                            `traefik`, `proxy`, `web`, etc.)
#   TRAEFIK_ENTRYPOINT      the HTTPS entrypoint name in your traefik.yml
#                           (commonly `websecure` or `https`)
#   TRAEFIK_CERTRESOLVER    the ACME / cert resolver name in traefik.yml
#                           (commonly `letsencrypt`, `myresolver`,
#                            `cloudflare` if using DNS-01)
#
# Cloudflare DNS gotcha: if `parley-miniapp.b11a.xyz` is set to PROXIED
# (orange cloud) in Cloudflare, Let's Encrypt's HTTP-01 challenge through
# Traefik will fail because Cloudflare terminates TLS upstream. Either set
# the record to DNS-only (grey cloud) for cert issuance, or switch
# Traefik's resolver to DNS-01 with Cloudflare API tokens.

services:

  miniapp:
    # Remove the 3000:3000 host binding from compose.yml. With docker
    # compose's deep-merge, declaring `ports: []` here replaces the parent
    # list entirely.
    ports: []
    expose:
      - "3000"
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.parley-miniapp.rule=Host(`${MINIAPP_HOST:-parley-miniapp.b11a.xyz}`)"
      - "traefik.http.routers.parley-miniapp.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.parley-miniapp.tls=true"
      - "traefik.http.routers.parley-miniapp.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.parley-miniapp.loadbalancer.server.port=3000"

networks:
  # The external network Traefik already lives on. Compose will fail with
  # `network not found` if TRAEFIK_NETWORK doesn't match an existing network
  # on the host â€” that's the right behaviour (catches typos at startup
  # rather than silently 404ing on the public hostname).
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
