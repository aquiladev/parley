; Supervisord config for the User Agent container. Three long-running
; processes share the container — supervisord owns each one, restarts on
; crash, and forwards logs to docker (stdout_logfile=/dev/stdout).
;
; Order is documented but not enforced: AXL boots fast, the sidecar polls
; AXL, and Hermes spawns its MCP children on demand (so MCPs don't appear
; here as separate processes).

[supervisord]
nodaemon=true
user=parley
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ---- AXL node (Go binary) ----
[program:axl-node]
command=/usr/local/bin/axl-node -config /opt/parley/axl/node-config.json
directory=/opt/parley
priority=10
autostart=true
autorestart=true
startsecs=2
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ---- AXL listener sidecar (chain-watcher + /recv polling) ----
; Waits implicitly: it just retries until the AXL HTTP API is up.
[program:axl-sidecar]
command=node /opt/parley/packages/user-agent/dist/axl-sidecar/src/index.js
directory=/opt/parley
priority=20
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=AXL_HTTP_URL="http://127.0.0.1:9002"

; ---- Hermes Agent (Telegram gateway, MCP host) ----
; Spawns axl-mcp + og-mcp as MCP stdio children — those don't appear here.
; Inside a Docker container, Hermes wants `gateway run` (foreground); the
; `start` form is for daemonized hosts (nohup, etc.) and refuses to fork
; under PID 1. Hermes prints the hint itself when invoked wrong.
[program:hermes]
command=/home/parley/.local/bin/hermes gateway run
directory=/home/parley
priority=30
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
