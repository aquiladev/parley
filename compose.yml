# Phase 6a: local Docker validation. Three services, one per host (per
# deployment.md §1's "one container per host" recommendation). Each agent
# image bundles its own AXL node so the mesh has two distinct identities.
#
# Bring-up: `make deploy-local` (or `docker compose up -d --build`).
#
# State that must survive restarts (deployment.md §3):
#   - axl.pem for each agent  → bind-mount from ./infra/state/<agent>/
#   - Hermes' ~/.hermes state → named volume `hermes_state`
#
# Single root .env mounted read-only into each container; never COPY'd into
# images. Per-service env filtering happens via `environment:` overrides
# below for hard-segregated secrets (defense in depth).

name: parley

# YAML anchor for the MM Agent service shape — both `mm-agent` and
# `mm-agent-2` share the same build, healthcheck, and dependency on the
# User Agent. Each service overrides its own per-instance env (key,
# ENS name, spread) and bind-mounts its own AXL identity. Phase 7 wires
# the second MM in; from a few it's just N copies of the same template.
x-mm-agent-base: &mm-agent-base
  build:
    context: .
    dockerfile: infra/Dockerfile.mm-agent
  env_file:
    - .env
  depends_on:
    user-agent:
      # Wait until AXL on the User Agent side is healthy — otherwise the
      # MM AXL node can't peer (compose.yml's depends_on makes sense here
      # because the AXL Peers list is one-way: mm → user).
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9002/topology >/dev/null 2>&1 || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 30s
  restart: unless-stopped

services:

  user-agent:
    build:
      context: .
      dockerfile: infra/Dockerfile.user-agent
    env_file:
      - .env
    environment:
      AXL_HTTP_URL: http://127.0.0.1:9002
      AXL_PRIVATE_KEY_PATH: /run/parley/axl.pem
      # Don't leak the MM hot wallet to the User Agent container.
      MM_EVM_PRIVATE_KEY: ""
    volumes:
      # AXL identity — must be mounted; entrypoint refuses to start without it.
      - ./infra/state/user-agent/axl.pem:/run/parley/axl.pem:ro
      # Hermes per-user state (sessions, pairing, conversation memory).
      - hermes_state:/home/parley/.hermes
    ports:
      # AXL TLS listener: peer reachability inside the compose network only;
      # publish the host port if the User Agent is reachable from the public
      # internet (Phase 6b on a real VPS).
      - "127.0.0.1:9001:9001"
    healthcheck:
      # AXL HTTP API exposes /topology on 9002 (localhost only). Curl from
      # inside the container.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9002/topology >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  mm-agent:
    <<: *mm-agent-base
    environment:
      AXL_HTTP_URL: http://127.0.0.1:9002
      AXL_PRIVATE_KEY_PATH: /run/parley/axl.pem
      # Don't leak Hermes / Telegram secrets to the MM Agent container.
      TELEGRAM_BOT_TOKEN: ""
      ANTHROPIC_API_KEY: ""
    volumes:
      - ./infra/state/mm-agent/axl.pem:/run/parley/axl.pem:ro
    ports:
      - "127.0.0.1:9011:9001"

  # Second MM Agent — Phase 7. Same image, different config. Brings up a
  # competing market maker so the User Agent surfaces multiple offers per
  # intent and the user picks. Only boots when MM2_EVM_PRIVATE_KEY is set
  # in .env (otherwise the entrypoint refuses to start with a missing-key
  # error — that's fine; you can leave it absent until you're ready).
  mm-agent-2:
    <<: *mm-agent-base
    environment:
      AXL_HTTP_URL: http://127.0.0.1:9002
      AXL_PRIVATE_KEY_PATH: /run/parley/axl.pem
      TELEGRAM_BOT_TOKEN: ""
      ANTHROPIC_API_KEY: ""
      # Per-instance overrides — these are the only values that distinguish
      # mm-agent-2 from mm-agent. Empty defaults so compose still parses
      # when MM2_* aren't set; mm-agent will simply fail boot in that case
      # (intentional — opt-in by setting the env vars).
      MM_EVM_PRIVATE_KEY: "${MM2_EVM_PRIVATE_KEY:-}"
      MM_ENS_NAME: "${MM2_ENS_NAME:-mm-2.parley.eth}"
      MM_SPREAD_BPS: "${MM2_SPREAD_BPS:-30}"
    volumes:
      - ./infra/state/mm-agent-2/axl.pem:/run/parley/axl.pem:ro
    ports:
      - "127.0.0.1:9012:9001"

  miniapp:
    build:
      context: .
      dockerfile: infra/Dockerfile.miniapp
      args:
        # NEXT_PUBLIC_* are baked at build time — sourced from the host shell
        # / .env via compose's variable interpolation. Compose reads .env
        # from the working dir by default, so these resolve before docker
        # build sees them.
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_SETTLEMENT_CONTRACT_ADDRESS: ${NEXT_PUBLIC_SETTLEMENT_CONTRACT_ADDRESS}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-11155111}
        # The wagmi transport URL. Same paid endpoint the agents use; without
        # this the wallet-side gas estimation falls back to public Sepolia
        # and "Network or RPC error" fires on every confirmation.
        NEXT_PUBLIC_SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
    env_file:
      - .env
    environment:
      # Defense in depth: the Mini App container has no use for any agent
      # private keys or LLM credentials.
      MM_EVM_PRIVATE_KEY: ""
      ANTHROPIC_API_KEY: ""
      ZG_COMPUTE_KEY: ""
      OG_PRIVATE_KEY: ""
      PARLEY_ROOT_PRIVATE_KEY: ""
    ports:
      - "3000:3000"
    healthcheck:
      # Next.js root page returns HTML when the server is up.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  hermes_state:
    name: parley_hermes_state
